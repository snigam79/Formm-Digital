<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formm — Trainer Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Cabinet+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#08080C;--bg1:#0F0F17;--bg2:#15151F;--bg3:#1C1C28;--bg4:#242433;--bg5:#2D2D40;
  --ln1:rgba(255,255,255,.06);--ln2:rgba(255,255,255,.10);--ln3:rgba(255,255,255,.16);
  --tx1:#F2F1EC;--tx2:#9896AE;--tx3:#5A5870;
  --teal:#00E0B5;--teal2:#00C49E;--td:rgba(0,224,181,.08);--tb:rgba(0,224,181,.18);
  --gold:#C8A86A;--gd2:rgba(200,168,106,.08);--gb:rgba(200,168,106,.22);
  --green:#36D99A;--gd:rgba(54,217,154,.10);
  --amber:#F5A524;--ad:rgba(245,165,36,.09);--ab:rgba(245,165,36,.25);
  --red:#FF4560;--rd:rgba(255,69,96,.09);
  --blue:#4DA3FF;--bd:rgba(77,163,255,.09);
  --purp:#9B7FFF;
  --disp:'Clash Display',sans-serif;
  --body:'Cabinet Grotesk',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
html,body{min-height:100vh;background:var(--bg);color:var(--tx1);font-family:var(--body);-webkit-font-smoothing:antialiased}

/* ── MODE TOGGLE ────────────────────────────────────────── */
.mode-bar{
  display:flex;gap:6px;justify-content:center;
  padding:14px 0;
  background:var(--bg);
  border-bottom:1px solid var(--ln1);
  position:sticky;top:0;z-index:100;
}
.mb{
  padding:6px 20px;border-radius:20px;
  border:1px solid var(--ln2);background:transparent;
  font-size:12px;font-weight:600;color:var(--tx2);
  cursor:pointer;font-family:var(--body);transition:all .15s;
}
.mb:hover{color:var(--tx1);border-color:var(--ln3)}
.mb.on{background:var(--gold);border-color:var(--gold);color:var(--bg)}

/* ════════════════════════════════════════════════════════
   DESKTOP LAYOUT
   ════════════════════════════════════════════════════════ */
#desk{
  display:flex;height:calc(100vh - 50px);
  background:var(--bg);
}
#mob-wrap{display:none;justify-content:center;padding:24px 0 40px;background:var(--bg)}

/* ── SIDEBAR ────────────────────────────────────────────── */
.dsb{
  width:200px;flex-shrink:0;
  background:var(--bg1);border-right:1px solid var(--ln1);
  display:flex;flex-direction:column;
}
.dsb-top{padding:18px 16px 12px;border-bottom:1px solid var(--ln1)}
.dsb-logo{font-family:var(--disp);font-size:18px;font-weight:700;letter-spacing:-.2px}
.dsb-logo span{color:var(--teal)}
.dsb-tier{
  display:inline-block;margin-top:4px;
  font-family:var(--mono);font-size:8px;letter-spacing:1px;text-transform:uppercase;
  color:var(--gold);padding:2px 8px;border:1px solid var(--gb);border-radius:4px;
}
.dsb-nav{padding:10px 8px;flex:1;overflow-y:auto}
.dsb-nav::-webkit-scrollbar{display:none}
.dsb-sec{
  font-family:var(--mono);font-size:8px;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--tx3);padding:8px 10px 4px;
}
.dsi{
  display:flex;align-items:center;gap:9px;
  padding:9px 12px;border-radius:8px;border:none;
  background:transparent;width:100%;text-align:left;
  font-size:12px;font-weight:500;color:var(--tx2);
  cursor:pointer;font-family:var(--body);transition:all .12s;
}
.dsi:hover{background:var(--bg3);color:var(--tx1)}
.dsi.on{background:var(--gd2);border:1px solid var(--gb);color:var(--gold)}
.dsi-ic{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.dsi-badge{
  margin-left:auto;background:var(--red);color:white;
  font-family:var(--mono);font-size:8px;padding:1px 5px;
  border-radius:8px;font-weight:600;
}
.dsb-foot{padding:14px 14px;border-top:1px solid var(--ln1)}
.dsb-av{width:32px;height:32px;border-radius:50%;background:var(--gd2);border:1px solid var(--gb);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.dsb-nm{font-size:12px;font-weight:600;color:var(--tx1)}
.dsb-sub{font-size:9px;color:var(--tx3);font-family:var(--mono)}

/* ── MAIN ───────────────────────────────────────────────── */
.dmain{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.dmh{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 22px;border-bottom:1px solid var(--ln1);
  background:var(--bg1);flex-shrink:0;
}
.dmh-title{font-family:var(--disp);font-size:20px;font-weight:700;letter-spacing:-.2px}
.dmh-sub{font-size:11px;color:var(--tx3);margin-top:2px;font-family:var(--mono)}
.dmh-r{display:flex;gap:7px;align-items:center}
.dbtn{
  padding:7px 15px;border-radius:8px;
  border:1px solid var(--ln2);background:transparent;
  font-size:11px;font-weight:600;color:var(--tx2);
  cursor:pointer;font-family:var(--body);transition:all .12s;
}
.dbtn:hover{color:var(--tx1);border-color:var(--ln3)}
.dbtn.p{background:var(--teal);border-color:var(--teal);color:var(--bg)}
.dbtn.p:hover{background:var(--teal2)}
.dscroll{flex:1;overflow-y:auto;padding:18px 22px}
.dscroll::-webkit-scrollbar{width:3px}
.dscroll::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}

/* Stats row */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:18px}
.stat{background:var(--bg2);border:1px solid var(--ln1);border-radius:10px;padding:11px 14px}
.stat-n{font-family:var(--disp);font-size:24px;font-weight:700;line-height:1;margin-bottom:2px}
.stat-l{font-size:9px;color:var(--tx3);font-family:var(--mono);letter-spacing:.5px;text-transform:uppercase}

/* Roster table */
.rtable{width:100%;border-collapse:collapse}
.rtable th{
  font-family:var(--mono);font-size:9px;letter-spacing:.8px;text-transform:uppercase;
  color:var(--tx3);padding:9px 11px;border-bottom:1px solid var(--ln1);
  text-align:left;font-weight:400;
}
.rtr{border-bottom:1px solid var(--ln1);cursor:pointer;transition:background .1s}
.rtr:hover{background:var(--bg2)}
.rtr.on{background:var(--gd2)}
.rtr td{padding:11px 11px;font-size:12px;vertical-align:middle}
.ccell{display:flex;align-items:center;gap:9px}
.cav{width:30px;height:30px;border-radius:50%;background:var(--bg3);border:1px solid var(--ln2);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.cname{font-size:13px;font-weight:600;color:var(--tx1)}
.cgoal{font-size:10px;color:var(--tx3)}
.tscore{font-family:var(--disp);font-size:22px;font-weight:700;line-height:1}
.trend-s{display:flex;gap:2px;align-items:flex-end;height:20px}
.tbar{width:6px;border-radius:1px 1px 0 0;flex-shrink:0}
.acwr-p{display:inline-flex;padding:2px 8px;border-radius:20px;font-family:var(--mono);font-size:9px;font-weight:600;border:1px solid}
.ap-g{background:var(--gd);border-color:rgba(54,217,154,.2);color:var(--green)}
.ap-a{background:var(--ad);border-color:var(--ab);color:var(--amber)}
.ap-r{background:var(--rd);border-color:rgba(255,69,96,.2);color:var(--red)}
.fault-t{font-size:11px;color:var(--tx2);max-width:150px;line-height:1.35}
.fault-t.w{color:var(--amber)}.fault-t.ok{color:var(--green)}
.seen{font-family:var(--mono);font-size:9px;color:var(--tx3)}

/* ── DETAIL PANEL ───────────────────────────────────────── */
.ddp{
  width:290px;flex-shrink:0;
  background:var(--bg1);border-left:1px solid var(--ln1);
  display:flex;flex-direction:column;overflow:hidden;
}
.ddp-empty{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:10px;padding:24px;text-align:center;
}
.ddp-ei{font-size:28px;opacity:.25}
.ddp-et{font-size:12px;color:var(--tx3);line-height:1.6}
.ddp-hdr{padding:15px 16px 11px;border-bottom:1px solid var(--ln1);flex-shrink:0}
.ddp-cr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ddp-av{width:40px;height:40px;border-radius:50%;background:var(--bg3);border:1px solid var(--ln2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ddp-nm{font-family:var(--disp);font-size:17px;font-weight:700;letter-spacing:-.2px;margin-bottom:2px}
.ddp-mt{font-size:10px;color:var(--tx3);font-family:var(--mono)}
.qs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.qst{background:var(--bg2);border-radius:8px;padding:8px 8px;text-align:center;border:1px solid var(--ln1)}
.qst-n{font-family:var(--disp);font-size:17px;font-weight:700;line-height:1;margin-bottom:2px}
.qst-l{font-size:8px;color:var(--tx3);font-family:var(--mono);letter-spacing:.5px;text-transform:uppercase}
.dtabs{display:flex;border-bottom:1px solid var(--ln1);padding:0 16px;flex-shrink:0}
.dtab{
  padding:9px 10px;font-size:11px;font-weight:500;color:var(--tx3);
  border-bottom:2px solid transparent;cursor:pointer;
  background:none;border-left:none;border-right:none;border-top:none;
  font-family:var(--body);transition:all .12s;
}
.dtab:hover{color:var(--tx1)}
.dtab.on{color:var(--teal);border-bottom-color:var(--teal);font-weight:600}
.dpc{padding:14px 16px;overflow-y:auto;flex:1}
.dpc::-webkit-scrollbar{display:none}

/* Session cards */
.si-list{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.si-item{
  background:var(--bg2);border:1px solid var(--ln1);
  border-radius:10px;padding:10px 12px;cursor:pointer;
  transition:border-color .1s;
}
.si-item:hover{border-color:var(--ln2)}
.si-item.fl{background:var(--ad);border-color:var(--ab)}
.si-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.si-ex{font-size:12px;font-weight:600;color:var(--tx1)}
.si-sc{font-family:var(--disp);font-size:18px;font-weight:700;line-height:1}
.si-rp{font-size:10px;color:var(--tx3);font-family:var(--mono);margin-bottom:3px}
.si-ft{font-size:10px;color:var(--tx2);line-height:1.35}
.si-ft.w{color:var(--amber)}.si-ft.ok{color:var(--green)}

/* Feedback */
.fb-area{margin-top:12px}
.fb-lbl{font-family:var(--mono);font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--tx3);margin-bottom:6px}
.fb-ta{
  width:100%;background:var(--bg3);border:1px solid var(--ln1);
  border-radius:8px;padding:9px 11px;font-size:12px;color:var(--tx1);
  font-family:var(--body);resize:none;outline:none;line-height:1.55;
}
.fb-ta::placeholder{color:var(--tx3)}
.fb-ta:focus{border-color:var(--teal)}
.fb-row{display:flex;align-items:center;gap:6px;margin-top:7px}
.fb-send{padding:6px 14px;border-radius:7px;background:var(--teal);border:none;font-size:11px;font-weight:600;color:var(--bg);cursor:pointer;font-family:var(--body)}
.fb-send:hover{background:var(--teal2)}
.fb-chars{font-family:var(--mono);font-size:9px;color:var(--tx3);margin-left:auto}

/* Message thread */
.msg-thread{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.msg-b{max-width:84%;padding:8px 11px;border-radius:10px;font-size:12px;line-height:1.5}
.msg-b.tr{background:var(--teal);color:var(--bg);align-self:flex-end;border-radius:10px 10px 2px 10px;margin-left:auto}
.msg-b.cl{background:var(--bg3);border:1px solid var(--ln1);align-self:flex-start;color:var(--tx1);border-radius:10px 10px 10px 2px}
.msg-t{font-family:var(--mono);font-size:8px;color:var(--tx3);margin-top:2px;text-align:right}
.msg-row{display:flex;gap:6px}
.msg-inp{
  flex:1;background:var(--bg3);border:1px solid var(--ln1);
  border-radius:8px;padding:7px 10px;font-size:12px;
  color:var(--tx1);outline:none;font-family:var(--body);
}
.msg-inp::placeholder{color:var(--tx3)}
.msg-inp:focus{border-color:var(--teal)}
.msg-send{padding:7px 12px;border-radius:8px;background:var(--teal);border:none;color:var(--bg);font-size:13px;cursor:pointer}
.msg-send:hover{background:var(--teal2)}

/* Schedule */
.sched-list{display:flex;flex-direction:column;gap:7px}
.sched-row{
  display:flex;align-items:center;gap:11px;
  padding:11px 13px;background:var(--bg2);
  border:1px solid var(--ln1);border-radius:10px;cursor:pointer;
  transition:border-color .1s;
}
.sched-row:hover{border-color:var(--ln2)}
.sched-bar{width:4px;height:32px;border-radius:2px;flex-shrink:0}
.sched-t{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--teal);min-width:40px}
.sched-nm{font-size:13px;font-weight:600;color:var(--tx1)}
.sched-nd{font-size:10px;color:var(--tx3);margin-top:1px}
.sched-chip{font-family:var(--mono);font-size:9px;font-weight:600;padding:2px 8px;border-radius:20px;margin-left:auto}
.chip-pt{background:var(--gd);color:var(--green)}
.chip-on{background:var(--bd);color:var(--blue)}

/* Exercise library */
.ex-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.ex-card{
  background:var(--bg2);border:1px solid var(--ln1);
  border-radius:10px;padding:13px 14px;cursor:pointer;
  transition:border-color .1s;
}
.ex-card:hover{border-color:var(--ln2)}
.ex-ic{font-size:20px;margin-bottom:7px}
.ex-nm{font-size:13px;font-weight:600;color:var(--tx1);margin-bottom:2px}
.ex-cat{font-size:10px;color:var(--tx3);margin-bottom:6px}
.ex-tag{display:inline-block;font-family:var(--mono);font-size:8px;padding:2px 7px;border-radius:4px;background:var(--bg3);border:1px solid var(--ln1);color:var(--tx2)}

/* Programmes */
.prog-list{display:flex;flex-direction:column;gap:9px}
.prog-card{
  background:var(--bg2);border:1px solid var(--ln1);
  border-radius:10px;padding:13px 15px;cursor:pointer;
  transition:border-color .1s;
}
.prog-card:hover{border-color:var(--ln2)}
.prog-nm{font-size:14px;font-weight:600;color:var(--tx1);margin-bottom:3px}
.prog-mt{font-size:11px;color:var(--tx3);margin-bottom:8px;font-family:var(--mono)}
.prog-bar{height:4px;background:var(--bg5);border-radius:2px;overflow:hidden;margin-bottom:4px}
.prog-fill{height:100%;border-radius:2px}
.prog-pct{font-size:10px;color:var(--tx2)}

/* Settings */
.set-group{margin-bottom:18px}
.set-glbl{font-family:var(--mono);font-size:8px;letter-spacing:1.2px;text-transform:uppercase;color:var(--tx3);margin-bottom:7px}
.set-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 14px;background:var(--bg2);border:1px solid var(--ln1);
  border-radius:10px;margin-bottom:6px;cursor:pointer;transition:border-color .1s;
}
.set-row:hover{border-color:var(--ln2)}
.set-lbl{font-size:13px;font-weight:500;color:var(--tx1)}
.set-val{font-size:12px;color:var(--tx3);font-family:var(--mono)}
.toggle{
  width:38px;height:21px;border-radius:12px;border:none;
  cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;
}
.toggle.on{background:var(--teal)}
.toggle.off{background:var(--bg5)}
.toggle::after{
  content:'';position:absolute;
  width:15px;height:15px;border-radius:50%;
  background:white;top:3px;transition:left .2s;
}
.toggle.on::after{left:20px}
.toggle.off::after{left:3px}

/* ════════════════════════════════════════════════════════
   MOBILE — phone shell
   ════════════════════════════════════════════════════════ */
.phone{
  width:390px;
  background:var(--bg1);
  border-radius:44px;
  border:1px solid rgba(255,255,255,.12);
  overflow:hidden;
  display:flex;flex-direction:column;
  min-height:820px;
  box-shadow:0 32px 80px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.03);
  position:relative;
}
.notch{width:120px;height:26px;background:var(--bg);border-radius:0 0 18px 18px;margin:0 auto;flex-shrink:0}
.sbar{display:flex;justify-content:space-between;align-items:center;padding:4px 22px 0;flex-shrink:0}
.sbar-t{font-family:var(--mono);font-size:11px;font-weight:500}
.sbar-r{font-size:10px;color:var(--tx2);font-family:var(--mono)}

/* Mobile top bar */
.m-topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px 10px;border-bottom:1px solid var(--ln1);
  background:var(--bg1);flex-shrink:0;
}
.m-logo{font-family:var(--disp);font-size:19px;font-weight:700;letter-spacing:-.2px}
.m-logo span{color:var(--teal)}
.m-tier{display:inline-block;margin-top:3px;font-family:var(--mono);font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);padding:2px 7px;border:1px solid var(--gb);border-radius:4px}
.m-notif{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:1px solid var(--ln2);display:flex;align-items:center;justify-content:center;font-size:16px;position:relative;cursor:pointer;flex-shrink:0}
.m-notif-dot{position:absolute;top:5px;right:5px;width:8px;height:8px;border-radius:50%;background:var(--red);border:2px solid var(--bg1)}

/* Mobile scroll content */
.m-content{flex:1;overflow-y:auto;overflow-x:hidden;min-height:0;-webkit-overflow-scrolling:touch}
.m-content::-webkit-scrollbar{display:none}

/* Mobile bottom nav */
.m-bnav{
  display:flex;background:rgba(15,15,23,.98);
  border-top:1px solid var(--ln1);
  padding:8px 0 max(18px,env(safe-area-inset-bottom));
  flex-shrink:0;
}
.m-bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:5px 0;position:relative}
.m-bni-ic{font-size:20px;opacity:.3;line-height:1;transition:opacity .12s}
.m-bni-lb{font-family:var(--mono);font-size:7px;color:var(--tx3);letter-spacing:.5px;text-transform:uppercase;opacity:0;font-weight:500;transition:opacity .12s}
.m-bni.on .m-bni-ic{opacity:1}
.m-bni.on .m-bni-lb{opacity:1;color:var(--gold)}
.m-badge{position:absolute;top:3px;right:14px;background:var(--red);color:white;font-family:var(--mono);font-size:8px;padding:1px 5px;border-radius:8px;font-weight:700;line-height:1.5}

/* Mobile content blocks */
.m-greet{padding:18px 20px 14px}
.m-gd{font-family:var(--mono);font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx3);margin-bottom:4px}
.m-gn{font-family:var(--disp);font-size:24px;font-weight:700;letter-spacing:-.3px;line-height:1.1}
.m-gs{font-size:13px;color:var(--tx2);margin-top:3px}
.m-sh{display:flex;align-items:center;justify-content:space-between;padding:4px 20px 9px}
.m-sht{font-family:var(--disp);font-size:18px;font-weight:700;letter-spacing:-.2px}
.m-shl{font-family:var(--mono);font-size:9px;color:var(--teal);cursor:pointer}

/* Today scroll */
/* today cards removed — replaced by priority feed */

/* Client cards */
.m-cl{padding:0 20px;display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.m-cc{background:var(--bg2);border:1px solid var(--ln1);border-radius:15px;padding:15px 16px;cursor:pointer;transition:border-color .1s}
.m-cc:active{border-color:var(--ln2)}
.m-cc.fl{background:var(--ad);border-color:var(--ab)}
.m-cc-r1{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.m-cc-av{width:42px;height:42px;border-radius:50%;background:var(--bg4);border:1px solid var(--ln2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.m-cc-nm{font-size:15px;font-weight:700;color:var(--tx1);line-height:1.2}
.m-cc-mt{font-family:var(--mono);font-size:9px;color:var(--tx3);margin-top:1px}
.m-cc-sc{font-family:var(--disp);font-size:32px;font-weight:700;line-height:1;flex-shrink:0}
.m-cc-r2{display:flex;align-items:flex-end;justify-content:space-between;gap:10px}

  </div>`;

  /* Wire up all taps */
  el.querySelectorAll('[data-cid]').forEach(e=>e.addEventListener('click',ev=>{
    ev.stopPropagation();
    const cid=+e.dataset.cid;
    const tab=e.classList.contains('m-alert')&&e.querySelector('.act-msg')?'messages':'sessions';
    openSheet(cid,tab);
  }));
  el.querySelectorAll('[data-filter]').forEach(btn=>btn.addEventListener('click',()=>{
    mFilter=btn.dataset.filter;
    renderMHome(el);
  }));
}
function renderMMessages(el){
  el.innerHTML=`<div class="m-greet"><div class="m-gn">Messages</div><div class="m-gs">3 unread</div></div>
  <div class="m-msgs">${clients.map(c=>{const last=c.msgs[c.msgs.length-1];const unread=last.from==='cl';
    return`<div class="m-mrow${unread?' unread':''}" data-cid="${c.id}">
      <div class="m-mav">${c.emoji}</div>
      <div style="flex:1;min-width:0"><div class="m-mnm">${c.name}</div><div class="m-mprev">${last.from==='tr'?'You: ':''}${last.text}</div></div>
      <div class="m-mtime">${last.time}</div>
      ${unread?'<div class="m-udot"></div>':''}
    </div>`;}).join('')}</div>`;
  el.querySelectorAll('[data-cid]').forEach(e=>e.addEventListener('click',()=>openSheet(+e.dataset.cid,'messages')));
}
function renderMSchedule(el){
  el.innerHTML=`<div class="m-greet"><div class="m-gd">Today</div><div class="m-gn">Schedule</div><div class="m-gs">5 sessions today</div></div>
  <div class="m-sh"><div class="m-sht">Tuesday, 10 June</div><span class="m-shl">Week →</span></div>
  <div class="m-sched">${schedData.map(s=>`
    <div class="m-si"${s.cid>=0?` data-cid="${s.cid}"`:''}>
      <div class="m-si-t">${s.time}</div>
      <div class="m-si-bar" style="background:${s.col}"></div>
      <div style="flex:1;min-width:0"><div class="m-si-nm">${s.name}</div><div class="m-si-nd">${s.note}</div></div>
      <div class="m-si-chip ${s.type==='pt'?'chip-pt':'chip-on'}">${s.type==='pt'?'In person':'Online'}</div>
    </div>`).join('')}</div>`;
  el.querySelectorAll('[data-cid]').forEach(e=>e.addEventListener('click',()=>openSheet(+e.dataset.cid,'sessions')));
}
function renderMProgrammes(el){
  el.innerHTML=`<div class="m-greet"><div class="m-gn">Programmes</div><div class="m-gs">4 active</div></div>
  <div class="m-sh"><div class="m-sht">Active</div></div>
  <div class="m-cl">${programmes.map(p=>`
    <div class="prog-card" onclick="showToast('${p.nm}')">
      <div class="prog-nm">${p.nm}</div><div class="prog-mt">Week ${p.cur} of ${p.weeks} · ${p.clients}</div>
      <div class="prog-bar"><div class="prog-fill" style="width:${Math.round((p.cur/p.weeks)*100)}%;background:${p.col}"></div></div>
      <div class="prog-pct">${Math.round((p.cur/p.weeks)*100)}% complete</div>
    </div>`).join('')}</div>`;
}
function renderMProfile(el){
  el.innerHTML=`<div class="m-greet"><div class="m-gn">Profile</div></div>
  <div class="m-profile">
    <div style="text-align:center;padding:4px 0 20px;border-bottom:1px solid var(--ln1);margin-bottom:16px">
      <div class="m-pav">🏋️</div>
      <div class="m-pnm">Samrat Nigam</div>
      <div class="m-psub">Gym PT · Trainer Pro · 5 clients</div>
    </div>
    <div class="set-glbl" style="font-family:var(--mono);font-size:8px;letter-spacing:1.2px;text-transform:uppercase;color:var(--tx3);margin-bottom:8px">Account</div>
    ${[['Specialisation','Gym PT / S&C'],['Plan','Trainer Pro'],['Sessions this month','23'],['Avg client score','81']].map(([l,v])=>`<div class="m-setrow" onclick="showToast('Edit ${l}')"><span class="m-setlbl">${l}</span><span class="m-setval">${v}</span></div>`).join('')}
    <div class="set-glbl" style="font-family:var(--mono);font-size:8px;letter-spacing:1.2px;text-transform:uppercase;color:var(--tx3);margin:14px 0 8px">Notifications</div>
    ${[['Push notifications','On'],['Email digests','Off'],['Session reminders','On']].map(([l,v])=>`<div class="m-setrow" onclick="showToast('Toggle ${l}')"><span class="m-setlbl">${l}</span><span class="m-setval">${v}</span></div>`).join('')}
    <div class="set-glbl" style="font-family:var(--mono);font-size:8px;letter-spacing:1.2px;text-transform:uppercase;color:var(--tx3);margin:14px 0 8px">Account</div>
    ${[['Change password','→'],['Sign out','→']].map(([l,v])=>`<div class="m-setrow" onclick="showToast('${l}')"><span class="m-setlbl">${l}</span><span class="m-setval">${v}</span></div>`).join('')}
  </div>`;
}

/* ── SHEET ─────────────────────────────────────────────── */
function openSheet(cid,tab){
  mSTab=tab||'sessions';
  const c=clients.find(x=>x.id===cid);
  renderSheetContent(c);
  document.getElementById('m-ov').classList.add('open');
  document.getElementById('m-sheet').classList.add('open');
}
function closeSheet(){
  document.getElementById('m-ov').classList.remove('open');
  document.getElementById('m-sheet').classList.remove('open');
}
function renderSheetContent(c){
  const mx=Math.max(...c.trend);
  document.getElementById('m-sh-body').innerHTML=`
  <div class="m-sh-hdr">
    <div class="m-sh-av">${c.emoji}</div>
    <div><div class="m-sh-nm">${c.name}</div><div class="m-sh-mt">${c.goal} · ${c.sessions} sessions</div></div>
    <div class="m-sh-cls" id="sh-cls">✕</div>
  </div>
  <span class="sh-acwr ${apC(c)}">● ACWR ${c.acwr}</span>
  <div class="m-sh-stats">
    <div class="m-sh-st"><div class="m-sh-stn ${scC(c.score)}">${c.score}</div><div class="m-sh-stl">Last</div></div>
    <div class="m-sh-st"><div class="m-sh-stn s-t">${c.avg}</div><div class="m-sh-stl">Avg</div></div>
    <div class="m-sh-st"><div class="m-sh-stn s-g" style="font-size:13px;padding-top:3px">${c.prog.split(' ')[0]}</div><div class="m-sh-stl">Progress</div></div>
  </div>
  <div class="m-sh-tabs">
    <button class="m-sh-tab${mSTab==='sessions'?' on':''}" data-st="sessions">Sessions</button>
    <button class="m-sh-tab${mSTab==='messages'?' on':''}" data-st="messages">Messages</button>
    <button class="m-sh-tab${mSTab==='trend'?' on':''}" data-st="trend">Trend</button>
  </div>
  <div id="m-sh-tab"></div>`;
  document.getElementById('sh-cls').onclick=closeSheet;
  document.querySelectorAll('.m-sh-tab').forEach(b=>b.onclick=()=>{
    mSTab=b.dataset.st;
    document.querySelectorAll('.m-sh-tab').forEach(x=>x.classList.toggle('on',x===b));
    renderSheetTab(c);
  });
  renderSheetTab(c);
}
function renderSheetTab(c){
  const el=document.getElementById('m-sh-tab');if(!el)return;
  const mx=Math.max(...c.trend);
  if(mSTab==='sessions'){
    el.innerHTML=`<div class="m-sh-sess">${c.hist.map(s=>`
      <div class="m-sh-s${s.fl?' fl':''}">
        <div class="m-sh-sinf">
          <div class="m-sh-sex">${s.ex} · ${s.date}</div>
          <div class="m-sh-srp">${s.reps} · RPE ${s.rpe}</div>
          <div class="m-sh-sft${s.fl?' w':''}">${s.fault}</div>
        </div>
        <div class="m-sh-ssc ${scC(s.score)}">${s.score}</div>
      </div>`).join('')}</div>
    <div class="m-sh-div"></div>
    <div class="m-sh-lbl">Coaching note</div>
    <textarea class="m-sh-ta" id="m-sh-ta" rows="3" placeholder="Cue or correction for ${c.name.split(' ')[0]}…"></textarea>
    <button class="m-sh-send" id="m-sh-send">Send feedback</button>
    <div class="m-sh-acts">
      <button class="m-sh-act" data-st="messages">💬 Message</button>
      <button class="m-sh-act" onclick="showToast('Full calendar in desktop view')">📅 Schedule</button>
    </div>`;
    document.getElementById('m-sh-send').onclick=()=>{
      const ta=document.getElementById('m-sh-ta');
      if(ta&&ta.value.trim()){ta.value='';closeSheet();showToast('Feedback sent to '+c.name.split(' ')[0]+' ✓')}
      else showToast('Write a note first');
    };
    el.querySelector('[data-st="messages"]').onclick=()=>{
      mSTab='messages';
      document.querySelectorAll('.m-sh-tab').forEach(x=>x.classList.toggle('on',x.dataset.st==='messages'));
      renderSheetTab(c);
    };
  }else if(mSTab==='messages'){
    el.innerHTML=`<div class="m-msg-thread">${c.msgs.map(m=>`
      <div><div class="m-mb ${m.from==='tr'?'tr':'cl'}">${m.text}</div>${m.from==='tr'?`<div class="m-mts">${m.time}</div>`:''}</div>`).join('')}</div>
    <div class="m-minp-row">
      <input class="m-minp" id="m-minp" placeholder="Message ${c.name.split(' ')[0]}…"/>
      <button class="m-msend" id="m-msend">→</button>
    </div>`;
    const send=()=>{const inp=document.getElementById('m-minp');if(inp&&inp.value.trim()){c.msgs.push({from:'tr',text:inp.value,time:'Now'});inp.value='';renderSheetTab(c)}};
    document.getElementById('m-msend').onclick=send;
    document.getElementById('m-minp').onkeydown=e=>{if(e.key==='Enter')send()};
    const sc2=document.getElementById('m-sh-sc');if(sc2)sc2.scrollTop=sc2.scrollHeight;
  }else if(mSTab==='trend'){
    const tbars=c.trend.map(v=>`<div class="m-sh-tbar" style="height:${Math.round((v/mx)*54)}px;background:${sc(v)};flex:1"></div>`).join('');
    el.innerHTML=`<div class="m-sh-lbl">7-session form score trend</div>
    <div class="m-sh-trend">${tbars}</div>
    <div class="m-sh-div"></div>
    <div class="m-sh-lbl">Progress</div>
    <div style="font-size:15px;font-weight:600;color:var(--tx1);margin-bottom:4px">${c.prog}</div>
    <div style="font-size:12px;color:var(--tx2)">Average: ${c.avg}/100 across ${c.sessions} sessions</div>`;
  }
}
document.getElementById('m-ov').addEventListener('click',closeSheet);
document.getElementById('m-notif').addEventListener('click',()=>openSheet(0,'sessions'));
document.querySelectorAll('.m-bni').forEach(b=>b.addEventListener('click',()=>setMView(b.dataset.mv)));

/* ── INIT ─────────────────────────────────────────────── */
function setMode(m){
  const isD=m==='desktop';
  document.getElementById('desk').style.display=isD?'flex':'none';
  document.getElementById('mob-wrap').style.display=isD?'none':'flex';
  document.getElementById('mb-d').classList.toggle('on',isD);
  document.getElementById('mb-m').classList.toggle('on',!isD);
}
setMode('desktop');
renderDMain();
setMView('home');
</script>
</body>
